<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Loja</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }
    .hidden { display: none !important; }
    .screen {
      min-height: 100vh;
      width: 100%;
    }
    .control {
      background: #111;
      padding: 20px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #bbb;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    textarea {
      width: 100%;
      min-height: 260px;
      border-radius: 16px;
      border: 1px solid #444;
      background: #000;
      color: #fff;
      padding: 16px;
      font-size: 28px;
      resize: vertical;
      outline: none;
    }
    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary {
      background: #fff;
      color: #000;
    }
    .secondary {
      background: #222;
      color: #fff;
      border: 1px solid #444;
    }
    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: #181818;
      border: 1px solid #333;
      color: #ddd;
      line-height: 1.5;
    }
    .topbar {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 14px;
      background: #0a0a0a;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .display {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }
    .display-text {
      width: 100%;
      max-width: 1600px;
      font-weight: 700;
      line-height: 0.95;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .smallnote {
      font-size: 14px;
      color: #aaa;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="secondary" id="btnControl">Abrir controle nesta aba</button>
    <button class="secondary" id="btnDisplay">Abrir painel nesta aba</button>
  </div>

  <section class="screen control" id="controlScreen">
    <div class="wrap">
      <div class="title">Controle da loja</div>
      <div class="subtitle">
        Digite no celular e a mensagem aparece no painel do computador em tempo real.
      </div>

      <textarea id="messageInput" placeholder="Digite aqui..."></textarea>

      <div class="buttons">
        <button class="primary" id="alarmButton">Alarme</button>
        <button class="secondary" id="clearButton">Limpar</button>
        <button class="secondary" id="voiceButton">Segure para falar (em breve)</button>
      </div>

      <div class="status" id="statusBox">Conectando...</div>
      <div class="smallnote">Projeto fixo para uma única loja, sem código de sala.</div>
    </div>
  </section>

  <section class="screen display hidden" id="displayScreen">
    <div class="display-text" id="displayText">Digite no celular para aparecer aqui</div>
  </section>

  <script>
    const SUPABASE_URL = "https://cunljsxsijvjuqetkwry.supabase.co";
    const SUPABASE_KEY = "sb_publishable_S_qPXf4Q-IWtOyiqA4d1KQ_wleiP_48";
    const CHANNEL_NAME = "painel-loja-unica";
    const MESSAGE_ROW_ID = 1;

    const controlScreen = document.getElementById("controlScreen");
    const displayScreen = document.getElementById("displayScreen");
    const displayText = document.getElementById("displayText");
    const messageInput = document.getElementById("messageInput");
    const alarmButton = document.getElementById("alarmButton");
    const clearButton = document.getElementById("clearButton");
    const voiceButton = document.getElementById("voiceButton");
    const statusBox = document.getElementById("statusBox");
    const btnControl = document.getElementById("btnControl");
    const btnDisplay = document.getElementById("btnDisplay");

    const params = new URLSearchParams(window.location.search);
    let mode = params.get("mode") === "display" ? "display" : "control";

    function setMode(nextMode) {
      mode = nextMode;
      const url = new URL(window.location.href);
      url.searchParams.set("mode", nextMode);
      window.history.replaceState({}, "", url.toString());
      renderMode();
    }

    btnControl.addEventListener("click", () => setMode("control"));
    btnDisplay.addEventListener("click", () => setMode("display"));

    function renderMode() {
      controlScreen.classList.toggle("hidden", mode !== "control");
      displayScreen.classList.toggle("hidden", mode !== "display");
    }

    function estimateFontSize(text) {
      const len = (text || "").trim().length;
      if (len <= 12) return 140;
      if (len <= 24) return 112;
      if (len <= 40) return 88;
      if (len <= 70) return 72;
      if (len <= 110) return 56;
      if (len <= 180) return 42;
      return 32;
    }

    function applyDisplayText(text) {
      const content = (text || "").trim() ? text : "Digite no celular para aparecer aqui";
      displayText.textContent = content;
      displayText.style.fontSize = estimateFontSize(content) + "px";
    }

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function playAlarm() {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        const ctx = new AudioContextClass();
        const now = ctx.currentTime;
        const master = ctx.createGain();
        master.gain.value = 0.12;
        master.connect(ctx.destination);

        [0, 0.22, 0.44].forEach((offset, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = index % 2 === 0 ? "square" : "sine";
          osc.frequency.value = index % 2 === 0 ? 880 : 660;
          gain.gain.setValueAtTime(0.0001, now + offset);
          gain.gain.exponentialRampToValueAtTime(0.9, now + offset + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.18);
          osc.connect(gain);
          gain.connect(master);
          osc.start(now + offset);
          osc.stop(now + offset + 0.2);
        });

        setTimeout(() => ctx.close().catch(() => {}), 1200);
      } catch (e) {
        console.error(e);
      }
    }

    renderMode();
    applyDisplayText("");

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function ensureTableAndRow() {
      // This pure static version expects a public table already created.
      // It still works for realtime broadcast without the table; the table is only for initial state restore.
      try {
        const { data } = await supabase
          .from("painel_estado")
          .select("mensagem")
          .eq("id", MESSAGE_ROW_ID)
          .maybeSingle();

        if (data && typeof data.mensagem === "string") {
          messageInput.value = data.mensagem;
          applyDisplayText(data.mensagem);
        }
      } catch (err) {
        console.warn("Tabela painel_estado ainda não encontrada. O realtime ainda pode funcionar para novas mensagens.", err);
      }
    }

    async function saveMessage(text) {
      try {
        await supabase.from("painel_estado").upsert({ id: MESSAGE_ROW_ID, mensagem: text });
      } catch (err) {
        console.warn("Não foi possível salvar estado inicial na tabela painel_estado.", err);
      }
    }

    let typingTimer;
    messageInput.addEventListener("input", () => {
      const text = messageInput.value;
      applyDisplayText(text);

      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => saveMessage(text), 250);

      channel.send({
        type: "broadcast",
        event: "text-update",
        payload: { text }
      });
    });

    alarmButton.addEventListener("click", () => {
      channel.send({
        type: "broadcast",
        event: "alarm",
        payload: { at: Date.now() }
      });
    });

    clearButton.addEventListener("click", () => {
      messageInput.value = "";
      applyDisplayText("");
      saveMessage("");
      channel.send({
        type: "broadcast",
        event: "text-update",
        payload: { text: "" }
      });
    });

    voiceButton.addEventListener("mousedown", () => {
      voiceButton.textContent = "Falando... (em breve)";
    });
    voiceButton.addEventListener("mouseup", () => {
      voiceButton.textContent = "Segure para falar (em breve)";
    });
    voiceButton.addEventListener("touchstart", () => {
      voiceButton.textContent = "Falando... (em breve)";
    });
    voiceButton.addEventListener("touchend", () => {
      voiceButton.textContent = "Segure para falar (em breve)";
    });

    const channel = supabase.channel(CHANNEL_NAME, {
      config: { broadcast: { self: true } }
    });

    channel
      .on("broadcast", { event: "text-update" }, ({ payload }) => {
        const text = payload?.text || "";
        if (mode === "display") {
          applyDisplayText(text);
        }
        if (mode === "control" && document.activeElement !== messageInput) {
          messageInput.value = text;
        }
      })
      .on("broadcast", { event: "alarm" }, () => {
        if (mode === "display") playAlarm();
      })
      .subscribe((status) => {
        if (status === "SUBSCRIBED") {
          setStatus("Conectado. Pode digitar no celular.");
          ensureTableAndRow();
        } else {
          setStatus("Status da conexão: " + status);
        }
      });
  </script>
</body>
</html>
