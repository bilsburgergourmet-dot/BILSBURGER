<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Loja</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background: #000; color: #fff; }
    .hidden { display: none !important; }

    .topbar {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 14px;
      background: #0a0a0a;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .screen { min-height: calc(100vh - 61px); width: 100%; }

    .control {
      background: #111;
      padding: 20px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #bbb;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      border-radius: 16px;
      border: 1px solid #444;
      background: #000;
      color: #fff;
      padding: 16px;
      font-size: 28px;
      resize: vertical;
      outline: none;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: #fff;
      color: #000;
    }

    .secondary {
      background: #222;
      color: #fff;
      border: 1px solid #444;
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: #181818;
      border: 1px solid #333;
      color: #ddd;
      line-height: 1.5;
    }

    .smallnote {
      font-size: 14px;
      color: #aaa;
      margin-top: 10px;
    }

    .display {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }

    .display-inner {
      width: 100%;
      max-width: 1600px;
    }

    .display-kicker {
      font-size: 14px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 28px;
    }

    .display-text {
      width: 100%;
      font-weight: 700;
      line-height: 0.94;
      word-break: break-word;
      white-space: pre-wrap;
    }

    @media (max-width: 768px) {
      .title { font-size: 24px; }
      textarea { font-size: 24px; min-height: 220px; }
      button { width: 100%; }
      .topbar { justify-content: stretch; flex-wrap: wrap; }
      .topbar button { flex: 1 1 100%; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="secondary" id="btnControl" type="button">Abrir controle nesta aba</button>
    <button class="secondary" id="btnDisplay" type="button">Abrir painel nesta aba</button>
  </div>

  <section class="screen control" id="controlScreen">
    <div class="wrap">
      <div class="title">Controle da loja</div>
      <div class="subtitle">
        Digite no celular e a mensagem aparece no painel do computador em tempo real.
      </div>

      <textarea id="messageInput" placeholder="Digite aqui..."></textarea>

      <div class="buttons">
        <button class="primary" id="alarmButton" type="button">Alarme</button>
        <button class="secondary" id="clearButton" type="button">Limpar</button>
        <button class="secondary" id="voiceButton" type="button">Segure para falar (em breve)</button>
      </div>

      <div class="status" id="statusBox">Conectando...</div>
      <div class="smallnote">Projeto fixo para uma única loja, sem código de sala.</div>
    </div>
  </section>

  <section class="screen display hidden" id="displayScreen">
    <div class="display-inner">
      <div class="display-kicker">Painel da loja</div>
      <div class="display-text" id="displayText">Digite no celular para aparecer aqui</div>
    </div>
  </section>

  <script>
    const SUPABASE_URL = "https://cunljsxsijvjuqetkwry.supabase.co";
    const SUPABASE_KEY = "sb_publishable_S_qPXf4Q-IWtOyiqA4d1KQ_wleiP_48";
    const CHANNEL_NAME = "painel-loja-unica";

    const controlScreen = document.getElementById("controlScreen");
    const displayScreen = document.getElementById("displayScreen");
    const displayText = document.getElementById("displayText");
    const messageInput = document.getElementById("messageInput");
    const alarmButton = document.getElementById("alarmButton");
    const clearButton = document.getElementById("clearButton");
    const voiceButton = document.getElementById("voiceButton");
    const statusBox = document.getElementById("statusBox");
    const btnControl = document.getElementById("btnControl");
    const btnDisplay = document.getElementById("btnDisplay");

    function getModeFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("mode") === "display" ? "display" : "control";
    }

    let mode = getModeFromUrl();

    function setMode(nextMode) {
      mode = nextMode;
      const url = new URL(window.location.href);
      url.searchParams.set("mode", nextMode);
      window.history.replaceState({}, "", url.toString());
      renderMode();
    }

    btnControl.addEventListener("click", function () { setMode("control"); });
    btnDisplay.addEventListener("click", function () { setMode("display"); });

    function renderMode() {
      controlScreen.classList.toggle("hidden", mode !== "control");
      displayScreen.classList.toggle("hidden", mode !== "display");
      document.title = mode === "display" ? "Painel Loja - Painel" : "Painel Loja - Controle";
    }

    function estimateFontSize(text) {
      const len = (text || "").trim().length;
      if (len <= 12) return 140;
      if (len <= 24) return 112;
      if (len <= 40) return 88;
      if (len <= 70) return 72;
      if (len <= 110) return 56;
      if (len <= 180) return 42;
      return 32;
    }

    function applyDisplayText(text) {
      const original = (typeof text === "string") ? text : "";
      const content = original.trim() ? original : "Digite no celular para aparecer aqui";
      displayText.textContent = content;
      displayText.style.fontSize = estimateFontSize(content) + "px";
    }

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function playAlarm() {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        const ctx = new AudioContextClass();
        const now = ctx.currentTime;
        const master = ctx.createGain();
        master.gain.value = 0.12;
        master.connect(ctx.destination);

        [0, 0.22, 0.44].forEach((offset, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = index % 2 === 0 ? "square" : "sine";
          osc.frequency.value = index % 2 === 0 ? 880 : 660;
          gain.gain.setValueAtTime(0.0001, now + offset);
          gain.gain.exponentialRampToValueAtTime(0.9, now + offset + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.18);
          osc.connect(gain);
          gain.connect(master);
          osc.start(now + offset);
          osc.stop(now + offset + 0.2);
        });

        setTimeout(function () {
          ctx.close().catch(function () {});
        }, 1200);
      } catch (e) {
        console.error(e);
      }
    }

    renderMode();
    applyDisplayText("");

    if (!window.supabase) {
      setStatus("Erro ao carregar Supabase.");
      console.error("Supabase JS não carregou.");
    } else {
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const channel = supabase.channel(CHANNEL_NAME, {
        config: { broadcast: { self: true } }
      });

      let typingTimer = null;

      messageInput.addEventListener("input", function () {
        const text = messageInput.value;
        applyDisplayText(text);

        clearTimeout(typingTimer);
        typingTimer = setTimeout(function () {
          channel.send({
            type: "broadcast",
            event: "text-update",
            payload: { text: text }
          });
        }, 60);
      });

      alarmButton.addEventListener("click", function () {
        channel.send({
          type: "broadcast",
          event: "alarm",
          payload: { at: Date.now() }
        });
      });

      clearButton.addEventListener("click", function () {
        messageInput.value = "";
        applyDisplayText("");
        channel.send({
          type: "broadcast",
          event: "text-update",
          payload: { text: "" }
        });
      });

      function startVoiceState() {
        voiceButton.textContent = "Falando... (em breve)";
      }

      function stopVoiceState() {
        voiceButton.textContent = "Segure para falar (em breve)";
      }

      voiceButton.addEventListener("mousedown", startVoiceState);
      voiceButton.addEventListener("mouseup", stopVoiceState);
      voiceButton.addEventListener("mouseleave", stopVoiceState);
      voiceButton.addEventListener("touchstart", startVoiceState);
      voiceButton.addEventListener("touchend", stopVoiceState);

      channel
        .on("broadcast", { event: "text-update" }, function ({ payload }) {
          const text = payload && typeof payload.text === "string" ? payload.text : "";
          if (mode === "display") {
            applyDisplayText(text);
          }
          if (mode === "control" && document.activeElement !== messageInput) {
            messageInput.value = text;
          }
        })
        .on("broadcast", { event: "alarm" }, function () {
          if (mode === "display") {
            playAlarm();
          }
        })
        .subscribe(function (status) {
          if (status === "SUBSCRIBED") {
            setStatus("Conectado. Pode digitar no celular.");
          } else {
            setStatus("Status da conexão: " + status);
          }
        });
    }
  </script>
</body>
</html>
